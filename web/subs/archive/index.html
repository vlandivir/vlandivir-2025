<body>
<header data-site-header data-active="subs" data-lang-ru="/subs/archive" data-lang-en="/subs/en"></header>

<main class="archive-page">
  <header class="archive-page__intro">
    <p class="eyebrow">IndexedDB</p>
    <h1>Архив</h1>
    <p class="archive-page__lead">Записи, убранные из редактора. Старые видео и реплики продолжают ссылаться на них по <code>id</code>. Восстановление не предусмотрено.</p>
  </header>

  <section class="saved-links archive-section" aria-labelledby="archive-videos-title">
    <h2 id="archive-videos-title">Видео</h2>
    <div class="links-list" id="archiveVideosList"></div>
    <p class="empty-state" id="archiveVideosEmpty">В архиве нет видео.</p>
  </section>

  <section class="saved-links archive-section" aria-labelledby="archive-styles-title">
    <h2 id="archive-styles-title">Стили</h2>
    <div class="links-list" id="archiveStylesList"></div>
    <p class="empty-state" id="archiveStylesEmpty">В архиве нет стилей.</p>
  </section>

  <section class="saved-links archive-section" aria-labelledby="archive-positions-title">
    <h2 id="archive-positions-title">Позиции</h2>
    <div class="links-list" id="archivePositionsList"></div>
    <p class="empty-state" id="archivePositionsEmpty">В архиве нет позиций.</p>
  </section>
</main>
