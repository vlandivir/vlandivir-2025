<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Выбор шрифтов для редактора субтитров ASS." />
<title>Шрифты — Subs ASS</title>
<link rel="stylesheet" href="/subs/fonts/fonts.css?v=20260517-8" />

<body>
<header class="font-page-header">

  </a>
  <nav class="font-page-nav">

    <h1>Шрифты для субтитров</h1>

    <div class="font-page-toolbar">
      <label class="font-page-search">
        <span class="visually-hidden">Поиск</span>
        <input id="fontSearchInput" type="search" placeholder="Поиск по названию…" autocomplete="off" />
      </label>
      <p class="font-page-count" id="fontCountLabel" aria-live="polite"></p>
    </div>
    <p class="font-page-status" id="fontStatus" hidden></p>
  </section>

  <ul class="font-list" id="fontList" aria-label="Каталог шрифтов"></ul>
