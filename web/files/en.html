<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A local list of files created or saved through the Subs and GPX pages." />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; connect-src 'self'; img-src 'self' https://fra1.digitaloceanspaces.com data: blob:; media-src 'self' https://fra1.digitaloceanspaces.com blob:; font-src 'self';" />
  <title>Your files</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/site-header.css?v=20260706-1" />
  <link rel="stylesheet" href="/files/styles.css?v=20260706-1" />
  <link rel="stylesheet" href="/shared/site-theme.css?v=20260603-3" />
  <script src="/shared/site-header.js?v=20260527-1" defer></script>
</head>
<body>
  <header data-site-header data-active="files" data-lang-ru="/files/" data-lang-en="/files/en"></header>

  <main class="shell">
    <section class="page-head" aria-labelledby="page-title">
      <div>
        <h1 id="page-title">Your files</h1>
        <p>Files this browser learned about through the Subs and GPX pages on this device.</p>
      </div>
      <button class="refresh-button" id="refreshButton" type="button">Refresh</button>
    </section>

    <section class="summary" aria-label="Summary">
      <div>
        <span class="summary__value" id="totalCount">0</span>
        <span class="summary__label">files</span>
      </div>
      <div>
        <span class="summary__value" id="totalSize">0 B</span>
        <span class="summary__label">known size</span>
      </div>
      <div>
        <span class="summary__value" id="sourceCount">0</span>
        <span class="summary__label">sources</span>
      </div>
    </section>

    <label class="file-search">
      <span>Search files and comments</span>
      <input id="searchInput" type="search" autocomplete="off" placeholder="Name, link, description, or comment" />
    </label>

    <section class="file-list" id="fileList" aria-live="polite"></section>
    <p class="empty" id="emptyState" hidden>No files yet. Upload a video on /subs or download a result from /gpx-route-png.</p>
  </main>

  <script src="/subs/fonts-shared.js?v=20260520-1"></script>
  <script src="/files/registry.js?v=20260527-1"></script>
  <script src="/files/app.js?v=20260530-1"></script>
</body>
</html>
