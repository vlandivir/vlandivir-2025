<!DOCTYPE html>

<body>
<main class="page-shell">
  <section class="hero" aria-labelledby="page-title">
    <div class="hero-copy">
      <div class="topline">
        <p class="eyebrow">vlandivir.com</p>
        <nav class="lang-switcher" aria-label="Language">
          <a href="/" lang="ru">RU</a>
          <a class="is-active" href="/en" lang="en" aria-current="page">EN</a>
        </nav>
      </div>
      <div class="actions" aria-label="Primary links">
        <a class="link-button link-button--primary" href="/gpx-route-png/en">Open GPX Track PNG</a>
        <a class="link-button" href="https://www.instagram.com/vlandivir/" target="_blank" rel="noopener noreferrer">Instagram @vlandivir</a>

    <div class="route-visual" aria-hidden="true">
      <img src="/gpx-route-png/images/step2-demo-bg.jpg?v=20260514b" alt="" width="1080" height="1920" />
      <svg viewBox="0 0 360 520" role="img" aria-label="">
        <path class="track-shadow" d="M71 438 C123 391 92 337 146 306 C203 273 181 220 244 193 C294 171 269 104 316 65" />

        <circle cx="316" cy="65" r="11" />
      </svg>
    </div>

  <section class="tool-block" aria-labelledby="gpx-title">
    <div>
      <p class="section-kicker">Web tool</p>
      <h2 id="gpx-title">GPX Track PNG</h2>
      <p>Upload a GPX file and get a vertical 1080×1920 PNG with your route line, points, and labels.</p>
    </div>
    <a class="tool-link" href="/gpx-route-png/en">
      <span>Go to generator</span>
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <path d="M5 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </a>
  </section>
